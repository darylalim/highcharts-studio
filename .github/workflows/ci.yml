name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the workflow only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # No setup-python step: `uv sync` reads .python-version (3.12) and
      # fetches a matching managed interpreter automatically if one isn't present.
      - name: Install dependencies (locked)
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest

  lint:
    name: Lint & format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # Run Ruff from the locked venv so its version has one source of truth —
      # pyproject.toml's dev group via uv.lock — with no hardcoded version
      # literals to drift. Both gates are non-mutating; --output-format=github
      # annotates PRs inline.
      - name: Install dependencies (locked)
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Type check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # ty resolves third-party imports (pandas, streamlit, highcharts-core)
      # from the project venv, so the sync is required here, not just pinning.
      # `uv run` uses the ty pinned in the dev group (uv.lock).
      # --output-format=github annotates PRs inline.
      - name: Install dependencies (locked)
        run: uv sync --locked

      - name: ty check
        run: uv run ty check --output-format=github

  release:
    name: Release (tag + GitHub release)
    needs: [test, lint, typecheck]
    # Only on a push to main, and only after all three gates are green — never on
    # a PR. So a release can only ever be cut from a fully-passing main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Scoped to this job alone, so the gate jobs above keep the top-level
    # least-privilege read-only token; only this one may create tags and releases.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags: the idempotency check reads existing tags, and
          # the annotated tag is placed on this exact commit.
          fetch-depth: 0

      - name: Cut a release when pyproject's version has no tag yet
        env:
          GH_TOKEN: ${{ github.token }}
        # .github/scripts/release.py is stdlib-only, so the runner's system Python
        # (3.12 on ubuntu-latest) runs it with no `uv sync` — its logic was already
        # exercised under the pinned venv by the three gate jobs this one needs.
        # The step is idempotent: if v{version} is already released it no-ops, so
        # it only cuts a release the first time a bumped version reaches main.
        run: |
          set -euo pipefail
          version="$(python3 .github/scripts/release.py version)"
          tag="v${version}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — nothing to cut."
            exit 0
          fi

          echo "pyproject is at $version with no $tag release — cutting it."
          python3 .github/scripts/release.py notes > "$RUNNER_TEMP/notes.md"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Annotated tag (matching the v0.7.0–v0.11.0 convention) at this commit,
          # created only if it isn't already on the remote.
          if ! git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            git tag -a "$tag" -m "$tag" "$GITHUB_SHA"
            git push origin "$tag"
          fi

          gh release create "$tag" \
            --title "$tag" \
            --notes-file "$RUNNER_TEMP/notes.md" \
            --target "$GITHUB_SHA" \
            --latest
