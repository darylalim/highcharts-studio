name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the workflow only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref — but only for PRs (rapid pushes to a
# branch under review). Pushes to main are NOT cancelled: they serialize in this
# group instead, so the release job below can never be killed mid-run (which could
# strand a tag with no release), and a queued main run still re-checks on its turn.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # No setup-python step: `uv sync` reads .python-version (3.12) and
      # fetches a matching managed interpreter automatically if one isn't present.
      - name: Install dependencies (locked)
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest

  lint:
    name: Lint & format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # Run Ruff from the locked venv so its version has one source of truth —
      # pyproject.toml's dev group via uv.lock — with no hardcoded version
      # literals to drift. Both gates are non-mutating; --output-format=github
      # annotates PRs inline.
      - name: Install dependencies (locked)
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Type check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # ty resolves third-party imports (pandas, streamlit, highcharts-core)
      # from the project venv, so the sync is required here, not just pinning.
      # `uv run` uses the ty pinned in the dev group (uv.lock).
      # --output-format=github annotates PRs inline.
      - name: Install dependencies (locked)
        run: uv sync --locked

      - name: ty check
        run: uv run ty check --output-format=github

  release:
    name: Release (tag + GitHub release)
    needs: [test, lint, typecheck]
    # Only on a push to main, and only after all three gates are green — never on
    # a PR. So a release can only ever be cut from a fully-passing main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Scoped to this job alone, so the gate jobs above keep the top-level
    # least-privilege read-only token; only this one may create tags and releases.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is load-bearing: an older un-released version (two bumps
          # in one push) is tagged at the commit that INTRODUCED it, found by a
          # pickaxe over pyproject.toml's whole history (git log -S below).
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Cut a release for every version above the latest released one
        env:
          GH_TOKEN: ${{ github.token }}
        # release.py is stdlib-only and needs no project deps, so it runs on the
        # uv-pinned 3.12 with `--no-project` (no `uv sync`) — the pinned
        # interpreter every other job and hook uses, not the runner's system
        # python3. Idempotent: a version already released is skipped, so on a push
        # that doesn't bump the version there is nothing above the watermark.
        run: |
          set -euo pipefail
          PY="uv run --no-project --python 3.12 python .github/scripts/release.py"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # The latest release is the watermark; anything above it still needs one.
          latest="$(gh release view --json tagName -q .tagName 2>/dev/null || true)"
          to_cut="$($PY to-release "$latest")"

          if [ -z "$to_cut" ]; then
            echo "Nothing above the latest release (${latest:-none}) — nothing to cut."
            exit 0
          fi

          # The current (highest) version — read only now that there's work to do.
          current="$($PY version)"

          # to_cut is oldest-first; version strings are whitespace-free tokens.
          for version in $to_cut; do
            tag="v${version}"
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "$tag already released — skipping."
              continue
            fi
            echo "Cutting $tag."

            notes="$RUNNER_TEMP/notes-$tag.md"
            $PY notes "$version" > "$notes"

            # The current (highest) version is tagged at HEAD (so its post-bump
            # commits ride along) and marked Latest; an older one is tagged at the
            # commit that first introduced its bump and is not Latest — either way
            # the tag's one checkable fact holds, that its commit declares this
            # version in pyproject.toml.
            if [ "$version" = "$current" ]; then
              commit="$GITHUB_SHA"
              latest_flag=true
            else
              commits="$(git log --reverse --format=%H \
                -S "version = \"$version\"" -- pyproject.toml)"
              commit="${commits%%$'\n'*}"
              if [ -z "$commit" ]; then
                echo "::error::No commit declares version $version in pyproject.toml."
                exit 1
              fi
              latest_flag=false
            fi

            # Annotated tag (matching the v0.7.0–v0.11.0 convention), created only
            # if it isn't already on the remote (a prior run may have pushed it).
            if ! git ls-remote --exit-code --tags origin "refs/tags/$tag" \
              >/dev/null 2>&1; then
              git tag -a "$tag" -m "$tag" "$commit"
              git push origin "$tag"
            fi

            gh release create "$tag" \
              --title "$tag" \
              --notes-file "$notes" \
              --latest="$latest_flag"
          done
