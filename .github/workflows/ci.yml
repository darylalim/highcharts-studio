name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the workflow only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # No setup-python step: `uv sync` reads .python-version (3.12) and
      # fetches a matching managed interpreter automatically if one isn't present.
      - name: Install dependencies (locked)
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest

  lint:
    name: Lint & format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # Run Ruff from the locked venv so its version has one source of truth —
      # pyproject.toml's dev group via uv.lock — with no hardcoded version
      # literals to drift. Both gates are non-mutating; --output-format=github
      # annotates PRs inline.
      - name: Install dependencies (locked)
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Type check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # ty resolves third-party imports (pandas, streamlit, highcharts-core)
      # from the project venv, so the sync is required here, not just pinning.
      # `uv run` uses the ty pinned in the dev group (uv.lock).
      # --output-format=github annotates PRs inline.
      - name: Install dependencies (locked)
        run: uv sync --locked

      - name: ty check
        run: uv run ty check --output-format=github
