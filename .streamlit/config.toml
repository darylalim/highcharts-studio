# Project-level Streamlit theme. Brands the app shell (sidebar controls, the
# source-data dataframe, code blocks, buttons). The Highcharts charts render in
# an iframe / shadow-root component, so these colors do NOT reach them directly:
# the charts are themed separately via highcharts_builder.DEFAULT_COLORS (which
# leads with primaryColor below) and, for the interactive CCv2 chart, live from
# the --st-* theme variables. Keep primaryColor in sync with DEFAULT_COLORS[0].
[theme]
base = "light"
primaryColor = "#2563eb"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f1f5f9"
textColor = "#0f172a"
font = "sans-serif"

[server]
# Auto-rerun on file save, so editing streamlit_app.py / the builder reloads
# without a manual rerun. Streamlit auto-uses the watchdog dev dependency for
# fast watching when it's installed, and falls back to polling otherwise — so we
# don't pin fileWatcherType (which would warn in installs without the dev group).
runOnSave = true
